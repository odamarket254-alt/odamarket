<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    
    <!-- Primary Meta Tags -->
    <title>OdaMarket - Premium B2B Marketplace</title>
    <meta name="description" content="OdaMarket is a leading premium B2B marketplace to find active suppliers, request quotations, and discover high-quality products." />
    <meta name="theme-color" content="#00C46A" />
    <link rel="canonical" href="https://odamarket.co.ke" />
    <meta name="robots" content="index, follow" />

    <!-- Favicon and Touch Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://odamarket.co.ke" />
    <meta property="og:title" content="OdaMarket - Premium B2B Marketplace" />
    <meta property="og:description" content="OdaMarket is a leading premium B2B marketplace to find active suppliers, request quotations, and discover high-quality products." />
    <meta property="og:image" content="https://odamarket.co.ke/logo.png" />
    <meta property="og:site_name" content="OdaMarket" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="OdaMarket - Premium B2B Marketplace" />
    <meta name="twitter:description" content="OdaMarket is a leading premium B2B marketplace to find active suppliers, request quotations, and discover high-quality products." />
    <meta name="twitter:image" content="https://odamarket.co.ke/logo.png" />

    <!-- Organization Schema (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "OdaMarket",
        "url": "https://odamarket.co.ke",
        "logo": "https://odamarket.co.ke/logo.png"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
